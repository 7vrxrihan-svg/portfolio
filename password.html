<!DOCTYPE html>
<html>
<head>
<title>Password Strength Checker</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:20px;
border-radius:10px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:8px;
margin-top:10px;
}

#strength{
margin-top:10px;
font-weight:bold;
}

.rules{
text-align:left;
font-size:14px;
margin-top:10px;
}
</style>

</head>
<body>

<div class="container">
<h2>Password Strength Checker</h2>

<input type="password" id="password" placeholder="Enter password">

<div id="strength"></div>

<div class="rules">
<p id="length">❌ At least 8 characters</p>
<p id="uppercase">❌ One uppercase letter</p>
<p id="number">❌ One number</p>
<p id="symbol">❌ One special character</p>
</div>

</div>

<script src="main.js"></script>

</body>
</html>
